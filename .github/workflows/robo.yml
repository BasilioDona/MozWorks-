name: robo-mozworks

on:
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install
        run: pip install requests beautifulsoup4

      - name: Run
        run: python robo_vagas.py

      - name: Save
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add vagas.json
          git commit -m "Vagas atualizadas" || exit 0
          git push
 
