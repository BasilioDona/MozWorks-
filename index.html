<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MozWorks | Empregos em Moçambique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Moz<span>Works</span></div>
        <nav>
            <a href="#vagas">Vagas</a>
            <a href="https://wa.me/seunumeroaqui" class="btn-contato">Publicar Vaga</a>
        </nav>
    </header>

    <section class="hero" id="hero-section">
        <div class="hero-overlay">
            <h2 id="frase-motivadora">Carregando oportunidades...</h2>
            <p>Conectando os melhores talentos às maiores empresas de Moçambique.</p>
        </div>
    </section>

    <section class="search-area">
        <div class="filtros">
            <input type="text" id="inputBusca" placeholder="Pesquisar cargo (ex: Técnico)...">
            <select id="selectProvincia">
                <option value="">Todas as Províncias</option>
                <option value="Maputo">Maputo</option>
                <option value="Matola">Matola</option>
                <option value="Sofala">Sofala</option>
                <option value="Nampula">Nampula</option>
                <option value="Tete">Tete</option>
                <option value="Manica">Manica</option>
                <option value="Zambézia">Zambézia</option>
                <option value="Gaza">Gaza</option>
                <option value="Inhambane">Inhambane</option>
                <option value="Cabo Delgado">Cabo Delgado</option>
                <option value="Niassa">Niassa</option>
            </select>
        </div>
    </section>

    <main id="containerVagas" class="vagas-grid">
        </main>

    <footer>
        <div class="footer-content">
            <h3>MozWorks</h3>
            <p>O maior portal de links de emprego em Moçambique.</p>
            <div class="socials">
                <span>Facebook</span> | <span>LinkedIn</span> | <span>WhatsApp</span>
            </div>
            <hr>
            <p class="copyright">&copy; 2026 MozWorks. Orgulhosamente Moçambicano.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
